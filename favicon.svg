<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="16" fill="#7a2a35"/>
  <!-- Gold border accent -->
  <rect x="4" y="4" width="92" height="92" rx="13" fill="none" stroke="#b8894a" stroke-width="2"/>
  <!-- Roof -->
  <polygon points="50,14 87,47 13,47" fill="#d4a96a"/>
  <!-- Roof ridge cap -->
  <polygon points="50,14 87,47 13,47" fill="none" stroke="#b8894a" stroke-width="1.5"/>
  <!-- House body -->
  <rect x="17" y="45" width="66" height="41" rx="2" fill="#fdf8f0"/>
  <!-- Door -->
  <rect x="39" y="58" width="22" height="28" rx="3" fill="#7a2a35"/>
  <!-- Door arch top -->
  <ellipse cx="50" cy="58" rx="11" ry="5" fill="#7a2a35"/>
  <!-- Cross on door -->
  <rect x="48.5" y="61" width="3" height="21" rx="1" fill="#d4a96a"/>
  <rect x="41" y="69" width="18" height="3" rx="1" fill="#d4a96a"/>
  <!-- Windows -->
  <rect x="21" y="54" width="12" height="10" rx="2" fill="#b8894a" opacity="0.5"/>
  <rect x="67" y="54" width="12" height="10" rx="2" fill="#b8894a" opacity="0.5"/>
</svg>
